<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVERSE AI Agent Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>VIVERSE<span>AI</span></h1>
            </div>
            <nav class="history">
                <div class="nav-label">Navigation</div>
                <div id="nav-chat" class="history-item active">
                    <span class="icon">💬</span>
                    <span class="text">Discovery Chat</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="status-badge online">Endpoint: Online</div>
            </div>
        </aside>

        <main id="main-content" class="main-content">
            <!-- Chat View (Default) -->
            <section id="chat-panel" class="chat-panel">
                <header class="chat-header">
                    <div class="agent-info">
                        <div class="agent-avatar"></div>
                        <div class="agent-meta">
                            <h2>VIVERSE AI Agent</h2>
                            <span class="status">Active Chat</span>
                        </div>
                    </div>
                </header>

                <div id="chat-messages" class="chat-messages">
                    <div class="message-bubble system">
                        <p>Welcome to VIVERSE Discovery. I am your specialized scout for exploring worlds, content, and
                            spaces within the VIVERSE ecosystem. How can I help you find your next destination today?
                        </p>
                    </div>
                </div>

                <footer class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea id="user-input" placeholder="Type your message here..." rows="1"></textarea>
                        <button id="send-btn" class="send-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path fill="currentColor" d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"></path>
                            </svg>
                        </button>
                    </div>
                </footer>
            </section>

            <section id="lower-preview" class="lower-preview collapsed">
                <header class="preview-header">
                    <div class="preview-info">
                        <span class="preview-title">World Preview</span>
                    </div>
                    <div class="preview-actions">
                        <button id="open-external-preview" title="Open in New Tab">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor"
                                    d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3m-2 16H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7z">
                                </path>
                            </svg>
                        </button>
                        <button id="close-preview" title="Close Preview">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor"
                                    d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </header>
                <div class="preview-content">
                    <iframe id="world-iframe" src="about:blank" frameborder="0"></iframe>
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
